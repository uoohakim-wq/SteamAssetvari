<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam 상점 그래픽 자산 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:#f3f4f6; color:#1f2937; min-height:100vh; }
  .container { max-width:960px; margin:0 auto; padding:24px; }
  .header-row { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap;
    gap:12px; margin-bottom:24px; }
  .header-row h1 { margin-bottom:4px; }
  h1 { color:#0f172a; font-size:24px; }
  .subtitle { color:#2563eb; font-size:13px; }
  .guide-link { display:inline-flex; align-items:center; gap:6px; padding:8px 14px;
    background:#eff6ff; border:1px solid #bfdbfe; color:#1d4ed8; border-radius:6px;
    font-size:12px; font-weight:600; text-decoration:none; transition:all .15s; white-space:nowrap; }
  .guide-link:hover { background:#dbeafe; border-color:#2563eb; }
  .guide-link svg { width:14px; height:14px; }

  /* Cards */
  .card { background:#ffffff; border:1px solid #e5e7eb; border-radius:8px; padding:20px; margin-bottom:16px;
    box-shadow:0 1px 3px rgba(15,23,42,0.04); }
  .card h2 { font-size:16px; color:#0f172a; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
  .step-num { background:#2563eb; color:#ffffff; width:24px; height:24px; border-radius:50%;
    display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }

  /* Upload */
  .upload-grid { display:flex; gap:16px; }
  .upload-grid > .drop-zone { flex:1; min-width:0; }
  .drop-zone { border:2px dashed #d1d5db; border-radius:8px; padding:32px 16px; text-align:center;
    cursor:pointer; transition:border-color .2s, background .2s; position:relative; background:#fafbfc; }
  .drop-zone:hover, .drop-zone.dragover { border-color:#2563eb; background:#eff6ff; }
  .drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .drop-zone .label { font-size:14px; color:#6b7280; }
  .drop-zone .label strong { color:#374151; display:block; margin-bottom:4px; }
  .preview-img { max-width:100%; max-height:140px; margin-top:8px; border-radius:4px; }
  .warning { background:#fef3c7; border:1px solid #f59e0b; color:#92400e; padding:8px 12px;
    border-radius:4px; font-size:12px; margin-top:8px; }

  /* Checkboxes (legacy, unused) */
  .checkbox-group { margin-bottom:12px; }
  .checkbox-group h3 { font-size:13px; color:#6b7280; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .checkbox-list { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .cb-item { display:flex; align-items:center; gap:8px; padding:8px 12px; background:#f9fafb;
    border-radius:4px; cursor:pointer; font-size:13px; }
  .cb-item:hover { background:#f3f4f6; }
  .cb-item input { accent-color:#2563eb; }
  .cb-item .size { color:#6b7280; font-size:11px; margin-left:auto; }

  /* Logo Controls (legacy) */
  .controls-grid { display:grid; grid-template-columns:2fr 1fr; gap:12px; }
  .control-group label { display:block; font-size:12px; color:#6b7280; margin-bottom:4px; }
  .control-group input[type=range] { width:100%; accent-color:#2563eb; }
  .control-group input[type=number] { width:80px; background:#ffffff; border:1px solid #d1d5db;
    color:#1f2937; padding:4px 8px; border-radius:4px; }
  .position-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; width:120px; }
  .pos-btn { background:#f3f4f6; border:1px solid #d1d5db; color:#6b7280; padding:6px; border-radius:3px;
    cursor:pointer; font-size:10px; text-align:center; }
  .pos-btn:hover { border-color:#2563eb; }
  .pos-btn.active { background:#2563eb; color:#ffffff; border-color:#2563eb; }
  .val-display { color:#2563eb; font-size:13px; font-weight:600; }
  .tooltip { background:#fef3c7; color:#92400e; font-size:11px; padding:6px 10px;
    border-radius:4px; margin-top:8px; border:1px solid #fcd34d; }

  /* Live Preview (legacy) */
  .preview-box-wrap { margin-top:16px; }
  .preview-box-header { display:flex; justify-content:space-between; align-items:center;
    margin-bottom:8px; font-size:12px; color:#6b7280; }
  .preview-box-header select { background:#ffffff; border:1px solid #d1d5db; color:#1f2937;
    padding:4px 8px; border-radius:4px; font-size:12px; }
  .preview-box-header .override-wrap { display:flex; gap:6px; align-items:center; }
  .preview-box-header input[type=number] { background:#ffffff; border:1px solid #d1d5db;
    color:#1f2937; padding:4px 8px; border-radius:4px; font-size:12px; width:90px; }
  .preview-box-header input[type=number].has-override { border-color:#d97706; color:#d97706; }
  .override-badge { font-size:10px; color:#d97706; }
  .preview-frame { position:relative; background:#f9fafb; border:1px solid #d1d5db; border-radius:4px;
    margin:0 auto; overflow:hidden;
    background-image:
      linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
      linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
    background-size:16px 16px;
    background-position:0 0, 0 8px, 8px -8px, -8px 0px; }
  .preview-logo { position:absolute; background:rgba(37,99,235,0.15);
    border:2px solid #2563eb; border-radius:2px; display:flex; align-items:center;
    justify-content:center; font-size:11px; color:#1e3a8a; font-weight:700; overflow:hidden; }
  .preview-logo img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
  .preview-pad-guide { position:absolute; border:1px dashed rgba(217,119,6,0.6); pointer-events:none; }
  .preview-dims { position:absolute; bottom:4px; right:6px; font-size:10px; color:#374151;
    background:rgba(255,255,255,0.9); padding:2px 6px; border-radius:2px; border:1px solid #e5e7eb; }
  .preview-legend { text-align:center; font-size:11px; color:#2563eb; margin-top:8px; line-height:1.6; }
  .preview-legend b { color:#d97706; }

  /* Asset Cards (combined Step 2) */
  .asset-card { background:#ffffff; border:1px solid #e5e7eb; border-radius:6px;
    padding:12px 14px; margin-bottom:8px; transition:opacity .2s; }
  .asset-card.required { border-left:3px solid #2563eb; }
  .asset-card.disabled { opacity:0.45; }
  .asset-card.disabled .asset-card-body { pointer-events:none; filter:grayscale(0.5); }
  .asset-card-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; cursor:pointer; }
  .asset-card-head input[type=checkbox] { accent-color:#2563eb; width:16px; height:16px; cursor:pointer; }
  .asset-card-head .title { font-size:14px; color:#0f172a; font-weight:600; }
  .asset-card-head .dims { font-size:11px; color:#6b7280; }
  .asset-card-head .badge { font-size:10px; background:#dbeafe; color:#1d4ed8;
    padding:2px 6px; border-radius:3px; font-weight:600; }
  .asset-card-head .badge.opt { background:#f3f4f6; color:#6b7280; }
  .asset-card-body { display:grid; grid-template-columns:minmax(0,1fr) 240px;
    gap:18px; align-items:center; }
  .asset-controls { display:flex; flex-direction:column; gap:16px; justify-content:center; }
  .asset-controls .ctrl-row { margin-bottom:0; }
  .asset-controls label { display:block; font-size:11px; color:#6b7280; margin-bottom:4px; }
  .asset-controls .val-display { color:#2563eb; font-weight:600; }
  .asset-controls input[type=number] { width:84px; background:#ffffff; border:1px solid #d1d5db;
    color:#1f2937; padding:4px 8px; border-radius:3px; font-size:12px; }
  .asset-controls input[type=range] { width:70%; accent-color:#2563eb; }
  .ctrl-row-hbox { display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap; }
  .mini-pos-grid { display:grid; grid-template-columns:repeat(3,28px); gap:3px; }
  .mini-pos-btn { background:#f3f4f6; border:1px solid #d1d5db; color:#6b7280;
    padding:4px; border-radius:2px; cursor:pointer; font-size:10px; text-align:center;
    user-select:none; }
  .mini-pos-btn:hover { border-color:#2563eb; }
  .mini-pos-btn.active { background:#2563eb; color:#ffffff; border-color:#2563eb; }
  .asset-preview-mini { position:relative; background:#f9fafb; border:1px solid #d1d5db;
    border-radius:4px; overflow:hidden; margin:0 auto;
    background-image:
      linear-gradient(45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(-45deg, #e5e7eb 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e5e7eb 75%),
      linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
    background-size:12px 12px;
    background-position:0 0, 0 6px, 6px -6px, -6px 0px; }
  .mini-logo { position:absolute; background:rgba(37,99,235,0.15);
    border:2px solid #2563eb; border-radius:2px; display:flex; align-items:center;
    justify-content:center; font-size:10px; color:#1e3a8a; font-weight:700; overflow:hidden; }
  .mini-logo img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
  .mini-pad-guide { position:absolute; border:1px dashed rgba(217,119,6,0.55); pointer-events:none; }
  .mini-dims { position:absolute; bottom:2px; right:4px; font-size:9px; color:#374151;
    background:rgba(255,255,255,0.9); padding:1px 4px; border-radius:2px; border:1px solid #e5e7eb; }
  .mini-legend { position:absolute; top:2px; left:4px; font-size:9px; color:#2563eb;
    background:rgba(255,255,255,0.9); padding:1px 4px; border-radius:2px; border:1px solid #e5e7eb; }
  .no-logo-note { color:#92400e; font-size:12px; padding:14px;
    background:#fef3c7; border-radius:4px; border:1px solid #fcd34d; }

  /* Tabs */
  .tab-bar { display:flex; gap:4px; border-bottom:2px solid #e5e7eb;
    margin-bottom:6px; flex-wrap:wrap; }
  .tab-desc { font-size:12px; color:#6b7280; margin-bottom:16px; padding:0 4px; }
  .per-tab-hint { font-size:11px; color:#6b7280; font-weight:400; margin-left:6px; }
  .tab { background:none; border:none; padding:10px 16px; font-size:13px; color:#6b7280;
    cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px;
    font-weight:500; transition:color .15s, border-color .15s; white-space:nowrap; }
  .tab:hover { color:#2563eb; }
  .tab.active { color:#2563eb; border-bottom-color:#2563eb; font-weight:600; }

  /* Per-asset note + safe zone */
  .asset-note { font-size:11px; color:#92400e; background:#fffbeb;
    border:1px solid #fcd34d; padding:6px 10px; border-radius:4px;
    margin-top:-4px; margin-bottom:10px; }
  .mini-safe-zone { position:absolute; border:2px dashed rgba(22,163,74,0.55);
    pointer-events:none; border-radius:2px; }
  .mini-safe-label { position:absolute; top:2px; right:4px; font-size:9px;
    color:#15803d; background:rgba(255,255,255,0.9); padding:1px 4px;
    border-radius:2px; border:1px solid #bbf7d0; }

  /* Generate */
  .btn-generate { width:100%; padding:14px; background:#16a34a; color:#ffffff; border:none;
    border-radius:6px; font-size:16px; font-weight:600; cursor:pointer; transition:background .2s; }
  .btn-generate:hover { background:#15803d; }
  .btn-generate:disabled { background:#a7f3d0; cursor:not-allowed; opacity:.7; color:#065f46; }

  /* Progress & Preview */
  .progress-list { margin-top:16px; }
  .progress-item { display:flex; align-items:center; gap:8px; padding:6px 0;
    border-bottom:1px solid #e5e7eb; font-size:13px; color:#374151; }
  .progress-item .status { width:70px; text-align:right; }
  .status-processing { color:#2563eb; }
  .status-done { color:#16a34a; }
  .status-error { color:#dc2626; }

  .preview-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin-top:16px; }
  .preview-card { background:#ffffff; border:1px solid #e5e7eb; border-radius:6px; overflow:hidden; }
  .preview-card img { width:100%; display:block; }
  .preview-card .name { padding:6px 8px; font-size:11px; color:#6b7280; }

  .btn-download { display:inline-block; margin-top:12px; padding:10px 24px; background:#2563eb;
    color:#ffffff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer;
    text-decoration:none; }
  .btn-download:hover { background:#1d4ed8; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <div>
      <h1>Steam 상점 그래픽 자산 생성기</h1>
      <p class="subtitle">키 비주얼 + 로고를 업로드하면 모든 Steam 그래픽 자산을 자동 생성합니다</p>
    </div>
    <a class="guide-link" id="guideLink" href="https://partner.steamgames.com/doc/store/assets" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Steam 가이드라인 열기
    </a>
  </div>

  <!-- Tab bar (top-level, controls all steps below) -->
  <div class="tab-bar" id="tabBar">
    <button class="tab" data-tab="library">라이브러리 자산</button>
    <button class="tab" data-tab="community">커뮤니티 &amp; 클라이언트 아이콘</button>
    <button class="tab active" data-tab="store">상점 그래픽 자산</button>
    <button class="tab" data-tab="event">이벤트 그래픽 자산</button>
  </div>
  <p id="tabDesc" class="tab-desc"></p>

  <!-- Step 1: Upload (per active tab) -->
  <div class="card">
    <h2><span class="step-num">1</span> 이미지 업로드<span class="per-tab-hint">— 각 탭별로 따로 저장됩니다</span></h2>
    <div class="upload-grid">
      <div class="drop-zone" id="kvZone">
        <input type="file" accept=".png,.jpg,.jpeg,.webp" id="kvInput">
        <div class="label"><strong>키 비주얼</strong>PNG/JPG, 2000px+ 권장</div>
        <img class="preview-img hidden" id="kvPreview">
      </div>
      <div class="drop-zone" id="logoZone">
        <input type="file" accept=".png,.jpg,.jpeg,.webp" id="logoInput">
        <div class="label"><strong>로고</strong>투명 배경 PNG 권장</div>
        <img class="preview-img hidden" id="logoPreview">
      </div>
    </div>
    <div id="uploadWarnings"></div>
  </div>

  <!-- Step 2: Assets + Logo Settings -->
  <div class="card">
    <h2><span class="step-num">2</span> 자산 선택 및 로고 설정</h2>
    <div id="assetCardList"></div>
  </div>

  <!-- Step 3: Generate -->
  <div class="card">
    <h2><span class="step-num">3</span> 생성</h2>
    <button class="btn-generate" id="generateBtn" disabled>이미지를 먼저 업로드하세요</button>
    <div class="progress-list hidden" id="progressList"></div>
    <div class="preview-grid hidden" id="previewGrid"></div>
    <div class="hidden" id="downloadSection">
      <a class="btn-download" id="downloadBtn" href="#">ZIP 다운로드</a>
    </div>
  </div>
</div>

<script>
// ===== Tab-based asset catalogs =====
const TABS = {
  library: {
    label: '라이브러리 자산',
    link: 'https://partner.steamgames.com/doc/store/assets/libraryassets',
    desc: '라이브러리 화면에서 쓰이는 자산. 히어로는 텍스트 금지, 로고는 투명 PNG로 분리 출력됩니다.',
    requires: { kv: true, logo: true },
    specs: {
      library_capsule: { w:600,  h:900,  required:true,  label:'라이브러리 캡슐 (세로)', mode:'kv+logo' },
      library_header:  { w:920,  h:430,  required:true,  label:'라이브러리 헤더', mode:'kv+logo' },
      library_hero:    { w:3840, h:1240, required:true,  label:'라이브러리 히어로', mode:'kv-only',
        safeZone:{w:860,h:380},
        note:'텍스트/로고 금지. 중요 요소는 중앙 860×380 안전 영역 안쪽으로.' },
      library_logo:    { w:1280, h:720,  required:true,  label:'라이브러리 로고', mode:'logo-only', output:'png',
        note:'투명 PNG. 로고/로고타입만 출력 (히어로 위에 오버레이됨).' },
    }
  },
  community: {
    label: '커뮤니티 & 클라이언트 아이콘',
    link: 'https://partner.steamgames.com/doc/store/assets/community',
    desc: '커뮤니티·클라이언트에서 쓰이는 정사각 아이콘. 앱 아이콘은 JPG(배경 필수), 단축 아이콘은 투명 PNG. 로고만 있으면 생성 가능.',
    requires: { kv: false, logo: true },
    specs: {
      app_icon:      { w:184,  h:184,  required:true,  label:'앱 아이콘', mode:'logo-on-bg',
        bgColor:'#1b2838', output:'jpeg',
        note:'JPG 필수(투명 불가). 배경색 지정 가능.' },
      shortcut_icon: { w:256,  h:256,  required:true,  label:'단축 아이콘', mode:'logo-only', output:'png',
        derivatives:[{w:512,h:512}],
        note:'투명 PNG. 512×512 파생 자동 생성.' },
    }
  },
  store: {
    label: '상점 그래픽 자산',
    link: 'https://partner.steamgames.com/doc/store/assets/standard',
    desc: '상점 페이지 캡슐들. 모든 이미지는 로고 외 텍스트 삽입 금지.',
    requires: { kv: true, logo: true },
    specs: {
      header_capsule:   { w:920,  h:430,  required:true,  label:'헤더 캡슐', mode:'kv+logo' },
      small_capsule:    { w:462,  h:174,  required:true,  label:'소형 캡슐', mode:'kv+logo',
        derivatives:[{w:184,h:69},{w:120,h:45}] },
      main_capsule:     { w:1232, h:706,  required:true,  label:'메인 캡슐', mode:'kv+logo' },
      vertical_capsule: { w:748,  h:896,  required:true,  label:'수직 캡슐', mode:'kv+logo' },
      page_background:  { w:1438, h:810,  required:false, label:'페이지 배경', mode:'kv-blur' },
      bundle_header:    { w:707,  h:232,  required:false, label:'꾸러미 헤더', mode:'kv+logo' },
    }
  },
  event: {
    label: '이벤트 그래픽 자산',
    link: 'https://partner.steamgames.com/doc/store/assets/eventassets',
    desc: '이벤트 페이지 자산. 커버는 필수, 헤더는 선택.',
    requires: { kv: true, logo: true },
    specs: {
      event_cover:  { w:800,  h:450, required:true,  label:'이벤트 커버', mode:'kv+logo' },
      event_header: { w:1920, h:622, required:false, label:'이벤트 헤더', mode:'kv+logo',
        note:'이벤트 페이지 상단. 텍스트 배치 가이드는 공식 템플릿 참고.' },
    }
  }
};
let activeTab = 'store';
function currentSpecs() { return TABS[activeTab].specs; }
function currentState() { return tabStates[activeTab]; }

// Per-tab uploaded files (KV + Logo)
const tabFiles = {};
for (const k of Object.keys(TABS)) tabFiles[k] = { kvFile: null, logoFile: null, kvUrl: null, logoUrl: null };

// ===== Canvas utilities =====
const POSITIONS = {
  TL: (cw, ch, lw, lh, pad) => ({ x: pad, y: pad }),
  TC: (cw, ch, lw, lh, pad) => ({ x: Math.round((cw-lw)/2), y: pad }),
  TR: (cw, ch, lw, lh, pad) => ({ x: cw-lw-pad, y: pad }),
  ML: (cw, ch, lw, lh, pad) => ({ x: pad, y: Math.round((ch-lh)/2) }),
  MC: (cw, ch, lw, lh, pad) => ({ x: Math.round((cw-lw)/2), y: Math.round((ch-lh)/2) }),
  MR: (cw, ch, lw, lh, pad) => ({ x: cw-lw-pad, y: Math.round((ch-lh)/2) }),
  BL: (cw, ch, lw, lh, pad) => ({ x: pad, y: ch-lh-pad }),
  BC: (cw, ch, lw, lh, pad) => ({ x: Math.round((cw-lw)/2), y: ch-lh-pad }),
  BR: (cw, ch, lw, lh, pad) => ({ x: cw-lw-pad, y: ch-lh-pad }),
};

function fileToImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('이미지를 불러올 수 없습니다'));
    img.src = URL.createObjectURL(file);
  });
}

function drawCoverFit(ctx, img, dx, dy, dw, dh) {
  const srcAspect = img.naturalWidth / img.naturalHeight;
  const dstAspect = dw / dh;
  let sx, sy, sw, sh;
  if (srcAspect > dstAspect) {
    sh = img.naturalHeight;
    sw = sh * dstAspect;
    sx = (img.naturalWidth - sw) / 2;
    sy = 0;
  } else {
    sw = img.naturalWidth;
    sh = sw / dstAspect;
    sx = 0;
    sy = (img.naturalHeight - sh) / 2;
  }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

function canvasToBlob(canvas, type = 'image/jpeg', quality = 0.95) {
  return new Promise(resolve => canvas.toBlob(resolve, type, quality));
}

function drawLogoByMode(ctx, logoImg, w, h, settings) {
  if (!logoImg) return;
  const scale = settings.scale ?? 0.4;
  const padding = settings.padding ?? 40;
  const position = settings.position || 'BC';
  const logoAspect = logoImg.naturalHeight / logoImg.naturalWidth;
  let lw = Math.round(w * scale);
  let lh = Math.round(lw * logoAspect);
  // fit-inside within (w - 2*pad, h - 2*pad)
  const maxW = Math.max(1, w - padding * 2);
  const maxH = Math.max(1, h - padding * 2);
  if (lw > maxW) { lw = maxW; lh = Math.round(lw * logoAspect); }
  if (lh > maxH) { lh = maxH; lw = Math.round(lh / logoAspect); }
  const posFn = POSITIONS[position] || POSITIONS.BC;
  const { x, y } = posFn(w, h, lw, lh, padding);
  ctx.drawImage(logoImg, Math.max(0, x), Math.max(0, y), lw, lh);
}

async function compositeAsset(kvImg, logoImg, key, w, h, spec, settings) {
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  const mode = spec.mode || 'kv+logo';
  const output = spec.output || 'jpeg';

  if (mode === 'kv-blur') {
    ctx.filter = 'blur(8px) brightness(0.6)';
    drawCoverFit(ctx, kvImg, 0, 0, w, h);
    ctx.filter = 'none';
  } else if (mode === 'kv-only') {
    drawCoverFit(ctx, kvImg, 0, 0, w, h);
  } else if (mode === 'logo-only') {
    // Transparent canvas with logo (scale/position/padding)
    drawLogoByMode(ctx, logoImg, w, h, settings);
  } else if (mode === 'logo-on-bg') {
    ctx.fillStyle = spec.bgColor || '#1b2838';
    ctx.fillRect(0, 0, w, h);
    drawLogoByMode(ctx, logoImg, w, h, settings);
  } else {
    // 'kv+logo' default
    drawCoverFit(ctx, kvImg, 0, 0, w, h);
    drawLogoByMode(ctx, logoImg, w, h, settings);
  }

  if (output === 'png') return canvasToBlob(canvas, 'image/png');
  return canvasToBlob(canvas, 'image/jpeg', 0.95);
}

function nextTick() { return new Promise(r => setTimeout(r, 0)); }

// ===== Per-tab state =====
const POSITIONS_ORDER = ['TL','TC','TR','ML','MC','MR','BL','BC','BR'];
const POS_LABELS = ['↖','↑','↗','←','●','→','↙','↓','↘'];

function initialStateFor(key, spec) {
  const mode = spec.mode || 'kv+logo';
  if (mode === 'logo-only' || mode === 'logo-on-bg') {
    return { enabled: spec.required, scale: 0.7, position: 'MC', padding: 16 };
  }
  if (mode === 'kv-only' || mode === 'kv-blur') {
    return { enabled: spec.required, scale: 0.4, position: 'BC', padding: 40 };
  }
  return { enabled: spec.required, scale: 0.4, position: 'BC',
    padding: key === 'small_capsule' ? 10 : 40 };
}

const tabStates = {};
for (const [tabKey, tab] of Object.entries(TABS)) {
  tabStates[tabKey] = {};
  for (const [k, s] of Object.entries(tab.specs)) tabStates[tabKey][k] = initialStateFor(k, s);
}

const assetCardList = document.getElementById('assetCardList');

function buildAssetCard(key, spec) {
  const state = currentState()[key];
  const mode = spec.mode || 'kv+logo';
  const showControls = !(mode === 'kv-only' || mode === 'kv-blur');
  const derivSub = spec.derivatives ? ` (+ ${spec.derivatives.map(d=>`${d.w}×${d.h}`).join(', ')})` : '';
  const outputTag = spec.output === 'png' ? 'PNG' : 'JPG';
  const modeNoteMap = {
    'kv-only':  '텍스트/로고 미합성 — 키 비주얼만 그대로 사용됩니다.',
    'kv-blur':  '키 비주얼을 블러 + 어둡게 처리해 배경으로 사용됩니다.',
  };

  const card = document.createElement('div');
  card.className = 'asset-card' + (spec.required ? ' required' : '') + (state.enabled ? '' : ' disabled');
  card.id = `asset-card-${key}`;
  card.innerHTML = `
    <label class="asset-card-head">
      <input type="checkbox" data-assetkey="${key}" ${state.enabled ? 'checked' : ''}>
      <span class="title">${spec.label}${derivSub}</span>
      <span class="dims">${spec.w}×${spec.h} · ${outputTag}</span>
      <span class="badge ${spec.required ? '' : 'opt'}">${spec.required ? '필수' : '선택'}</span>
    </label>
    ${spec.note ? `<div class="asset-note">${spec.note}</div>` : ''}
    <div class="asset-card-body">
      <div class="asset-preview-mini" data-preview="${key}" data-mode="${mode}">
        ${spec.safeZone ? '<div class="mini-safe-zone"></div><div class="mini-safe-label">안전 영역</div>' : ''}
        <div class="mini-pad-guide"></div>
        <div class="mini-logo">LOGO</div>
        <div class="mini-legend"></div>
        <div class="mini-dims">${spec.w}×${spec.h}</div>
      </div>
      ${showControls ? `
        <div class="asset-controls">
          <div class="ctrl-row">
            <label>로고 크기: <span class="val-display" data-scaleval="${key}">${Math.round(state.scale*100)}%</span></label>
            <input type="range" data-scale="${key}" min="10" max="95" value="${Math.round(state.scale*100)}">
          </div>
          <div class="ctrl-row ctrl-row-hbox">
            <div>
              <label>로고 위치</label>
              <div class="mini-pos-grid" data-posgrid="${key}"></div>
            </div>
            <div>
              <label>여백 (px)</label>
              <input type="number" data-padding="${key}" value="${state.padding}" min="0" max="500">
            </div>
          </div>
        </div>
      ` : `
        <div class="no-logo-note">${modeNoteMap[mode] || ''}</div>
      `}
    </div>
  `;
  return card;
}

function buildMiniPosGrid(key) {
  const grid = assetCardList.querySelector(`[data-posgrid="${key}"]`);
  if (!grid) return;
  POSITIONS_ORDER.forEach((p, i) => {
    const b = document.createElement('div');
    b.className = 'mini-pos-btn' + (currentState()[key].position === p ? ' active' : '');
    b.textContent = POS_LABELS[i];
    b.dataset.pos = p;
    b.onclick = () => {
      grid.querySelectorAll('.mini-pos-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      currentState()[key].position = p;
      updateAssetPreview(key);
    };
    grid.appendChild(b);
  });
}

function updateAssetPreview(key) {
  const spec = currentSpecs()[key];
  const state = currentState()[key];
  const previewEl = assetCardList.querySelector(`[data-preview="${key}"]`);
  if (!previewEl || !spec) return;

  const MAX_W = 560, MAX_H = 220;
  let fw = MAX_W, fh = MAX_W * spec.h / spec.w;
  if (fh > MAX_H) { fh = MAX_H; fw = MAX_H * spec.w / spec.h; }
  previewEl.style.width = fw + 'px';
  previewEl.style.height = fh + 'px';

  const mode = spec.mode || 'kv+logo';
  const miniLogo = previewEl.querySelector('.mini-logo');
  const padGuide = previewEl.querySelector('.mini-pad-guide');
  const legend = previewEl.querySelector('.mini-legend');
  const safeEl = previewEl.querySelector('.mini-safe-zone');
  const safeLabel = previewEl.querySelector('.mini-safe-label');
  const ds = fw / spec.w;

  // Safe zone (library_hero)
  if (safeEl && spec.safeZone) {
    const sw = spec.safeZone.w * ds, sh_ = spec.safeZone.h * ds;
    safeEl.style.left = ((fw - sw)/2) + 'px';
    safeEl.style.top = ((fh - sh_)/2) + 'px';
    safeEl.style.width = sw + 'px';
    safeEl.style.height = sh_ + 'px';
  }

  // Background styling for logo-on-bg
  if (mode === 'logo-on-bg') {
    previewEl.style.backgroundImage = 'none';
    previewEl.style.background = spec.bgColor || '#1b2838';
  } else {
    previewEl.style.backgroundImage = '';
    previewEl.style.background = '';
  }

  if (mode === 'kv-only' || mode === 'kv-blur') {
    miniLogo.style.display = 'none';
    padGuide.style.display = 'none';
    legend.textContent = mode === 'kv-blur' ? '블러 배경' : (spec.safeZone ? '텍스트 금지 / 안전 영역' : '로고 미적용');
    return;
  }

  miniLogo.style.display = '';
  padGuide.style.display = '';

  const logoPrev = document.getElementById('logoPreview');
  let aspect = 2.5;
  if (!logoPrev.classList.contains('hidden') && logoPrev.naturalWidth > 0) {
    aspect = logoPrev.naturalWidth / logoPrev.naturalHeight;
  }
  // fit-inside within padded area
  const padSrc = state.padding;
  const maxWSrc = Math.max(1, spec.w - padSrc*2);
  const maxHSrc = Math.max(1, spec.h - padSrc*2);
  let logoActualW = spec.w * state.scale;
  let logoActualH = logoActualW / aspect;
  if (logoActualW > maxWSrc) { logoActualW = maxWSrc; logoActualH = logoActualW / aspect; }
  if (logoActualH > maxHSrc) { logoActualH = maxHSrc; logoActualW = logoActualH * aspect; }

  const lw = logoActualW * ds;
  const lh = logoActualH * ds;
  const pad = state.padding * ds;

  let left = 0, top = 0;
  switch (state.position) {
    case 'TL': left = pad; top = pad; break;
    case 'TC': left = (fw-lw)/2; top = pad; break;
    case 'TR': left = fw-lw-pad; top = pad; break;
    case 'ML': left = pad; top = (fh-lh)/2; break;
    case 'MC': left = (fw-lw)/2; top = (fh-lh)/2; break;
    case 'MR': left = fw-lw-pad; top = (fh-lh)/2; break;
    case 'BL': left = pad; top = fh-lh-pad; break;
    case 'BC': left = (fw-lw)/2; top = fh-lh-pad; break;
    case 'BR': left = fw-lw-pad; top = fh-lh-pad; break;
  }
  miniLogo.style.width = lw + 'px';
  miniLogo.style.height = lh + 'px';
  miniLogo.style.left = left + 'px';
  miniLogo.style.top = top + 'px';
  if (!logoPrev.classList.contains('hidden')) {
    miniLogo.innerHTML = `<img src="${logoPrev.src}">`;
    miniLogo.style.background = 'rgba(37,99,235,0.1)';
  } else {
    miniLogo.innerHTML = 'LOGO';
    miniLogo.style.background = 'rgba(37,99,235,0.2)';
  }

  padGuide.style.left = pad + 'px';
  padGuide.style.top = pad + 'px';
  padGuide.style.width = Math.max(0, fw - pad*2) + 'px';
  padGuide.style.height = Math.max(0, fh - pad*2) + 'px';

  const pw = ((state.padding/spec.w)*100).toFixed(1);
  legend.textContent = `여백 ${state.padding}px · 너비의 ${pw}%`;
}

function rebuildCards() {
  assetCardList.innerHTML = '';
  for (const [key, spec] of Object.entries(currentSpecs())) {
    assetCardList.appendChild(buildAssetCard(key, spec));
  }
  for (const key of Object.keys(currentSpecs())) buildMiniPosGrid(key);
  for (const key of Object.keys(currentSpecs())) updateAssetPreview(key);
}

function switchTab(tabKey) {
  if (!TABS[tabKey]) return;
  activeTab = tabKey;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabKey));
  document.getElementById('tabDesc').textContent = TABS[tabKey].desc;
  const link = document.getElementById('guideLink');
  if (link) link.href = TABS[tabKey].link;
  syncUploadUI();
  rebuildCards();
}

function syncUploadUI() {
  const req = TABS[activeTab].requires;
  const files = tabFiles[activeTab];
  document.getElementById('kvZone').style.display = req.kv ? '' : 'none';
  document.getElementById('logoZone').style.display = req.logo ? '' : 'none';

  document.getElementById('kvInput').value = '';
  document.getElementById('logoInput').value = '';

  const kvPrev = document.getElementById('kvPreview');
  const logoPrev = document.getElementById('logoPreview');

  if (files.kvFile) {
    if (!files.kvUrl) files.kvUrl = URL.createObjectURL(files.kvFile);
    kvPrev.src = files.kvUrl;
    kvPrev.classList.remove('hidden');
  } else {
    kvPrev.removeAttribute('src');
    kvPrev.classList.add('hidden');
  }
  if (files.logoFile) {
    if (!files.logoUrl) files.logoUrl = URL.createObjectURL(files.logoFile);
    logoPrev.src = files.logoUrl;
    logoPrev.classList.remove('hidden');
  } else {
    logoPrev.removeAttribute('src');
    logoPrev.classList.add('hidden');
  }
  document.getElementById('uploadWarnings').innerHTML = '';
  checkUploadReady();
}

// Tab click handlers
document.getElementById('tabBar').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (btn?.dataset.tab) switchTab(btn.dataset.tab);
});

// Event delegation: sliders + padding inputs
assetCardList.addEventListener('input', e => {
  const t = e.target;
  const scaleKey = t.dataset.scale;
  const padKey = t.dataset.padding;
  if (scaleKey) {
    const v = parseInt(t.value);
    currentState()[scaleKey].scale = v / 100;
    const valEl = assetCardList.querySelector(`[data-scaleval="${scaleKey}"]`);
    if (valEl) valEl.textContent = v + '%';
    updateAssetPreview(scaleKey);
  } else if (padKey) {
    currentState()[padKey].padding = Math.max(0, parseInt(t.value) || 0);
    updateAssetPreview(padKey);
  }
});

// Checkbox toggle
assetCardList.addEventListener('change', e => {
  const cb = e.target;
  const key = cb.dataset?.assetkey;
  if (key && cb.type === 'checkbox') {
    currentState()[key].enabled = cb.checked;
    document.getElementById(`asset-card-${key}`).classList.toggle('disabled', !cb.checked);
  }
});

// Re-render all previews when logo / kv uploaded
document.getElementById('logoPreview').addEventListener('load', () => {
  for (const k of Object.keys(currentSpecs())) updateAssetPreview(k);
});
document.getElementById('kvPreview').addEventListener('load', () => {
  for (const k of Object.keys(currentSpecs())) updateAssetPreview(k);
});

// Initial render (defaults to 'store' tab)
switchTab(activeTab);

// File uploads with drag & drop — stores to tabFiles[activeTab]
function setupDropZone(zoneId, inputId, previewId, fileKey, urlKey) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  const preview = document.getElementById(previewId);

  ['dragenter','dragover'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(e => zone.addEventListener(e, ev => { ev.preventDefault(); zone.classList.remove('dragover'); }));

  zone.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file) { input.files = e.dataTransfer.files; handleFile(file, preview); }
  });
  input.addEventListener('change', () => {
    if (input.files[0]) handleFile(input.files[0], preview);
  });

  function handleFile(file, prev) {
    const slot = tabFiles[activeTab];
    if (slot[urlKey]) URL.revokeObjectURL(slot[urlKey]);
    slot[fileKey] = file;
    slot[urlKey] = URL.createObjectURL(file);
    prev.src = slot[urlKey];
    prev.classList.remove('hidden');
    checkUploadReady();
  }
}

setupDropZone('kvZone','kvInput','kvPreview','kvFile','kvUrl');
setupDropZone('logoZone','logoInput','logoPreview','logoFile','logoUrl');

function checkUploadReady() {
  const req = TABS[activeTab].requires;
  const files = tabFiles[activeTab];
  const btn = document.getElementById('generateBtn');
  const kvOk = !req.kv || !!files.kvFile;
  const logoOk = !req.logo || !!files.logoFile;
  if (kvOk && logoOk) {
    btn.disabled = false;
    btn.textContent = '자산 생성하기';
  } else {
    btn.disabled = true;
    const missing = [];
    if (!kvOk) missing.push('키 비주얼');
    if (!logoOk) missing.push('로고');
    btn.textContent = `${missing.join(' + ')} 업로드 필요`;
  }
}

function updateProgress(id, status) {
  const el = document.getElementById(`prog-${id}`);
  if (!el) return;
  const statusEl = el.querySelector('.status');
  statusEl.textContent = status === 'done' ? '완료' : status === 'error' ? '오류' : '처리 중...';
  statusEl.className = `status status-${status === 'done' ? 'done' : status === 'error' ? 'error' : 'processing'}`;
}

function addPreviewCard(container, name, src) {
  const card = document.createElement('div');
  card.className = 'preview-card';
  card.innerHTML = `<img src="${src}" alt="${name}"><div class="name">${name}</div>`;
  container.appendChild(card);
}

function showWarnings(warnings) {
  const div = document.getElementById('uploadWarnings');
  div.innerHTML = (warnings || []).map(w => `<div class="warning">${w}</div>`).join('');
}

// Generate (100% client-side)
document.getElementById('generateBtn').addEventListener('click', async () => {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '이미지 로딩 중...';

  try {
    const req = TABS[activeTab].requires;
    const files = tabFiles[activeTab];
    if (req.kv && !files.kvFile) throw new Error('키 비주얼을 업로드하세요');
    if (req.logo && !files.logoFile) throw new Error('로고를 업로드하세요');

    const [kvImg, logoImg] = await Promise.all([
      files.kvFile ? fileToImage(files.kvFile) : Promise.resolve(null),
      files.logoFile ? fileToImage(files.logoFile) : Promise.resolve(null),
    ]);

    const warnings = [];
    if (kvImg && kvImg.naturalWidth < 2000) warnings.push(`키 비주얼 권장 2000px 이상 (현재 ${kvImg.naturalWidth}px)`);
    if (logoImg && logoImg.naturalWidth < 300) warnings.push(`로고 권장 300px 이상 (현재 ${logoImg.naturalWidth}px)`);
    showWarnings(warnings);

    const specs = currentSpecs();
    const state = currentState();
    const selected = Object.keys(specs).filter(k => state[k].enabled);
    if (!selected.length) {
      alert('생성할 자산을 하나 이상 선택하세요.');
      btn.disabled = false; btn.textContent = '자산 생성하기'; return;
    }

    btn.textContent = '생성 중...';

    const progressList = document.getElementById('progressList');
    const previewGrid = document.getElementById('previewGrid');
    const downloadSection = document.getElementById('downloadSection');
    progressList.innerHTML = '';
    previewGrid.innerHTML = '';
    progressList.classList.remove('hidden');
    previewGrid.classList.remove('hidden');
    downloadSection.classList.add('hidden');

    for (const key of selected) {
      const item = document.createElement('div');
      item.className = 'progress-item';
      item.id = `prog-${key}`;
      item.innerHTML = `<span>${specs[key]?.label || key}</span><span class="status status-processing">대기</span>`;
      progressList.appendChild(item);
    }

    const zip = new JSZip();

    for (const key of selected) {
      const spec = specs[key];
      const ext = spec.output === 'png' ? 'png' : 'jpg';
      updateProgress(key, 'processing');
      await nextTick();

      try {
        const blob = await compositeAsset(kvImg, logoImg, key, spec.w, spec.h, spec, state[key]);
        const filename = `${key}.${ext}`;
        zip.file(filename, blob);
        addPreviewCard(previewGrid, key, URL.createObjectURL(blob));
        updateProgress(key, 'done');

        if (spec.derivatives) {
          for (const d of spec.derivatives) {
            const dBlob = await compositeAsset(kvImg, logoImg, key, d.w, d.h, spec, state[key]);
            const dName = `${key}_${d.w}x${d.h}.${ext}`;
            zip.file(dName, dBlob);
            addPreviewCard(previewGrid, dName, URL.createObjectURL(dBlob));
          }
        }
      } catch (err) {
        console.error(`Error processing ${key}:`, err);
        updateProgress(key, 'error');
      }
    }

    btn.textContent = 'ZIP 압축 중...';
    await nextTick();
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const zipUrl = URL.createObjectURL(zipBlob);
    const dlBtn = document.getElementById('downloadBtn');
    dlBtn.href = zipUrl;
    dlBtn.download = `steam_${activeTab}_${Date.now()}.zip`;
    downloadSection.classList.remove('hidden');
    btn.textContent = '완료! 다른 탭/설정 변경 후 다시 생성 가능';
    btn.disabled = false;
  } catch (err) {
    alert('오류: ' + err.message);
    btn.disabled = false;
    btn.textContent = '자산 생성하기';
  }
});
